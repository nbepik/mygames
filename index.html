<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Мои Игры</title>

<style>

body{
    margin:0;
    background:#6b21a8;
    font-family:Arial,sans-serif;
}

h1{
    text-align:center;
    color:white;
    padding:20px;
}

.games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    text-decoration:none;
    color:black;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
}

.name{
    padding:12px;
    text-align:center;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>🎮 Мои Игры</h1>

<div class="games">

<a class="card" href="https://spacewaves2.io" target="_blank">
<img src="spacewaves.jpg">
<div class="name">Space Waves</div>
</a>

<a class="card" href="https://blockblast.game/" target="_blank">
<img src="blockblast.jpg">
<div class="name">Block Blast</div>
</a>

<a class="card" href="https://www.miniplay.com/game/aquapark-io" target="_blank">
<img src="aquapark.jpg">
<div class="name">Aquapark.io</div>
</a>

<a class="card" href="https://manrunner2048.io/" target="_blank">
<img src="runner2048.jpg">
<div class="name">Runner 2048</div>
</a>

<a class="card" href="https://games.voodoo.io/paperio2" target="_blank">
<img src="paperio2.jpg">
<div class="name">Paper.io 2</div>
</a>

<a class="card" href="http://slither.com/io" target="_blank">
<img src="slither.jpg">
<div class="name">Slither.io</div>
</a>

<a class="card" href="https://www.miniplay.com/game/noob-snake-2048" target="_blank">
<img src="noob2048.jpg">
<div class="name">Noob Snake 2048</div>
</a>

<a class="card" href="https://www.1001games.com/arcade/stack-fall" target="_blank">
<img src="stackfall.jpg">
<div class="name">Stack Fall</div>
</a>

<a class="card" href="https://www.worldguessr.com/de" target="_blank">
<img src="worldguessr.jpg">
<div class="name">WorldGuessr</div>
</a>

<a class="card" href="https://geometry-games.io/dig-out-of-prison" target="_blank">
<img src="digout.jpg">
<div class="name">Dig Out Of Prison</div>
</a>

<a class="card" href="https://thiefpuzzle.io/" target="_blank">
<img src="thiefpuzzle.jpg">
<div class="name">Thief Puzzle</div>
</a>

<a class="card" href="https://ozogames.com/game/poxel-io/" target="_blank">
<img src="poxelio.jpg">
<div class="name">Poxel.io</div>
</a>

<a class="card" href="https://agar.io/#ffa" target="_blank">
<img src="agario.jpg">
<div class="name">Agar.io</div>
</a>

</div>

</body>
</html>
